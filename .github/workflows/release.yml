name: Release share zip

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "MuMuClear.ps1"
      - "tool/**"
      - "README.md"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag/version (e.g. v1.0.0). Leave empty to auto-generate."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $v = $env:GITHUB_REF_NAME
          } elseif ("${{ github.event.inputs.version }}".Trim()) {
            $v = "${{ github.event.inputs.version }}".Trim()
          } else {
            # push main / empty dispatch: auto version
            $v = "v1.${{ github.run_number }}.0"
          }
          if ($v -notmatch '^v') { $v = "v$v" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "version=$v"

      - name: Build MuMuClear-share.zip
        id: zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $required = @(
            'MuMuClear.ps1',
            'tool\Lawnchair_app.lawnchair_signed.apk',
            'tool\LawnchairRecentsOverlay.apk',
            'tool\privapp-permissions-app.lawnchair.xml',
            'tool\Adb\adb.exe',
            'tool\Adb\AdbWinApi.dll',
            'tool\Adb\AdbWinUsbApi.dll'
          )
          foreach ($p in $required) {
            if (-not (Test-Path -LiteralPath $p)) { throw "missing required file: $p" }
          }

          $stage = Join-Path $env:RUNNER_TEMP 'MuMuClear-share'
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item -LiteralPath 'MuMuClear.ps1' -Destination $stage
          Copy-Item -LiteralPath 'tool' -Destination (Join-Path $stage 'tool') -Recurse

          # tool/ 仅资源，不应再含任何 .ps1
          Get-ChildItem (Join-Path $stage 'tool') -Recurse -File -Filter '*.ps1' |
            Remove-Item -Force -ErrorAction SilentlyContinue

          # 不打包本地/调试残留
          Get-ChildItem (Join-Path $stage 'tool') -Recurse -File |
            Where-Object { $_.Name -match '\.idsig$|Debug|shared_Lawnchair|\.zip$' } |
            Remove-Item -Force -ErrorAction SilentlyContinue

          # 可选：附带精简 README（有则复制）
          if (Test-Path -LiteralPath 'README.md') {
            Copy-Item -LiteralPath 'README.md' -Destination (Join-Path $stage 'README.md')
          }

          $zipName = 'MuMuClear-share.zip'
          $zip = Join-Path $PWD $zipName
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $stage '*') -DestinationPath $zip -Force
          $item = Get-Item $zip
          Write-Host ("zip={0} size={1}" -f $item.FullName, $item.Length)
          if ($item.Length -lt 1MB) { throw 'zip too small' }

          "name=$zipName" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "path=$zip" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "size=$($item.Length)" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuMuClear-share
          path: MuMuClear-share.zip
          if-no-files-found: error

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: MuMuClear ${{ steps.ver.outputs.version }}
          body: |
            ## MuMuClear ${{ steps.ver.outputs.version }}

            下载 **MuMuClear-share.zip**，解压到**英文路径**后，在 MuMu 已启动且 **Root + 可写系统** 已开时执行：

            ```powershell
            .\MuMuClear.ps1 -PrivilegedInstall
            # 多开指定实例：
            .\MuMuClear.ps1 -Index N -PrivilegedInstall
            ```

            - 黑屏救援：`.\MuMuClear.ps1 -RecoverOnly`
            - 仅连接：`.\MuMuClear.ps1 -ConnectOnly`

            ### 本版要点（分享包复现用）
            - **纯系统替换**覆盖 `/system/priv-app`（双路径 `app.lawnchair` + `Lawnchair`，0755/0644）
            - Host 加固：`phone.rom.reset=0`、`system_vdi.sharable=Writable`、`root=true`，减轻冷启动回广告桌面
            - 清爽 APK：`16.Dev.(#4651)` 系统特权桌面（实测可与 UU 远程电源共存）
            - **UU 远程开关机**：装完后请先**完整开机一次**再测远程重启；若只关不开，用 CLI：
              ```text
              mumu-cli control -v N launch
              mumu-cli control -v N restart
              ```
            - **不再依赖** KernelSU 做冷启动持久化
            - Windows CRLF 多行 adb shell 已处理；推送后校验远端 APK 大小

            详见 README「常见问题 4 / 5」。
          files: |
            MuMuClear-share.zip
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
